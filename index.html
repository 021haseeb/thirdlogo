<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
    margin:0;
    padding:20px;
    background:#fff;
    font-family:'Poppins', Arial, sans-serif;
}

.signature{
    width:900px;
    border-collapse:collapse;
}

.logo-cell{
    width:45%;
    text-align:center;
    vertical-align:middle;
    padding-right:40px;
}

.content-cell{
    width:55%;
    vertical-align:top;
    padding-left:40px;
    border-left:4px solid #5B7C99; /* EXACT VERTICAL DIVIDER */
}

.logo{
    width:320px;
    max-width:100%;
}

.name{
    font-size:54px;
    font-weight:500;
    color:#444444;
    line-height:1;
    margin:0;
}

.position{
    font-size:24px;
    font-weight:500;
    text-transform:uppercase;
    color:#444444;
    margin-top:8px;
}

.top-line{
    height:1px;
    background:#5B7C99;
    margin:22px 0 30px;
}

.row{
    display:flex;
    align-items:center;
    margin-bottom:18px;
}

.icon{
    width:46px;
    height:46px;
    border-radius:50%;
    background:#5B7C99;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:21px;
    flex-shrink:0;
}

.info{
    margin-left:18px;
    padding-left:18px;
    border-left:4px solid #5B7C99;
    font-size:18px;
    font-weight:600;
    color:#444444;
    line-height:1.4;
}

.address{
    line-height:1.3;
}
</style>
</head>

<body>

<table class="signature" cellpadding="0" cellspacing="0" border="0">
<tr>

<td class="logo-cell">
    <img src="logo.png" alt="Parkview Healthcare" class="logo" style="width:420px;">
</td>

<td class="content-cell">

    <div class="name">Name</div>

    <div class="position">POSITION</div>

    <div class="top-line"></div>

    <div class="row">
        <div class="icon">
            <i class="fa-solid fa-phone"></i>
        </div>

        <div class="info">
    <a href="tel:+15736426646" style="color:#444444;text-decoration:none;">
    (573) 642-6646
</a>
</div>
    </div>

    <div class="row">
        <div class="icon">
            <i class="fa-solid fa-envelope"></i>
        </div>

        <div class="info">
    <a href="mailto:info@kingdomcaresl.com" style="color:#444444;text-decoration:none;">
    info@kingdomcaresl.com
</a>
</div>
    </div>

    <div class="row">
        <div class="icon">
            <i class="fa-solid fa-globe"></i>
        </div>

        <div class="info">
    <a href="https://facebook.com/kingdomcaresl" target="_blank" style="color:#444444;text-decoration:none;">
        facebook.com/kingdomcaresl
    </a>
</div>
    </div>

    <div class="row">
        <div class="icon">
            <i class="fa-solid fa-location-dot"></i>
        </div>

        <div class="info address">
    <a href="https://maps.google.com/?q=811+Center+St+Fulton+MO+65251"
   style="color:#444444;text-decoration:none;">
    811 Center St Fulton, MO 65251
</a>
</div>
    </div>

</td>

</tr>
</table>

</body>
</html>
